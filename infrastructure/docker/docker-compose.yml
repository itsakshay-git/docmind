services:
  postgres:
    image: postgres:16

    container_name: docmind-postgres

    environment:
      POSTGRES_DB: docmind
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5433:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d docmind"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
