server:
  port: 8081

spring:
  application:
    name: docmind-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/docmind}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}

        chat:
          options:
            model: gemini-2.5-flash

        embedding:
          api-key: ${GEMINI_API_KEY}
          vertex-ai: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: DocMind API
    description: Notebook-scoped source ingestion, RAG chat, and Studio artifact API

docmind:
  cors:
    allowed-origins: ${DOCMIND_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5500,http://127.0.0.1:5500}

  studio:
    tts-model: ${DOCMIND_STUDIO_TTS_MODEL:gemini-3.1-flash-tts-preview}
    tts-host-a-voice: ${DOCMIND_STUDIO_TTS_HOST_A_VOICE:Charon}
    tts-host-b-voice: ${DOCMIND_STUDIO_TTS_HOST_B_VOICE:Aoede}
    audio-storage-dir: ${DOCMIND_STUDIO_AUDIO_STORAGE_DIR:storage/studio-audio}
    image-storage-dir: ${DOCMIND_STUDIO_IMAGE_STORAGE_DIR:storage/studio-images}

  demo:
    enabled: ${DOCMIND_DEMO_ENABLED:true}
    email: ${DOCMIND_DEMO_EMAIL:recruiter@docmind.dev}
    password: ${DOCMIND_DEMO_PASSWORD:Demo@12345}
    full-name: ${DOCMIND_DEMO_FULL_NAME:Recruiter Demo}
